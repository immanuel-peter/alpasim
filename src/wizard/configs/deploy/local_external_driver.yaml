# @package _global_
# Deploy target: local workstation with external driver process.
# See docs/MANUAL_DRIVER.md for usage.
#   uv run alpasim_wizard deploy=local_external_driver topology=1gpu driver=vavam wizard.log_dir=./out

defaults:
  - local
  - _self_

wizard:
  debug_flags:
    use_localhost: true
  run_sim_services:
    ["sensorsim", "physics", "trafficsim", "controller", "runtime"]
  external_services:
    driver:
      - "localhost:6789"

# Override to 10Hz for smoother interactive sessions
runtime:
  simulation_config:
    control_timestep_us: 100_000
    time_start_offset_us: 100_000
    cameras:
      - height: 1080
        width: 1920
        logical_id: camera_front_wide_120fov
        frame_interval_us: 100_000
        shutter_duration_us: 30_000
        first_frame_offset_us: -30_000
