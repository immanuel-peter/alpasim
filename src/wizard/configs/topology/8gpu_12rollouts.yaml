# @package _global_
# 8-GPU topology: 12 concurrent rollouts. For SLURM cluster runs.

defines:
  nre_cache_size: 4  # sensorsim.n_concurrent_rollouts + 1
  physics_cache_size: 16

services:
  sensorsim:
    replicas_per_container: 1
    gpus: [0, 1, 2, 3]

  driver:
    gpus: [4, 5, 6, 7]
    replicas_per_container: 1

  physics:
    replicas_per_container: 1
    gpus: [2, 3, 4, 5, 6, 7]

  controller:
    replicas_per_container: 2
    gpus: null

  trafficsim:
    replicas_per_container: 1
    gpus: [0, 1]

runtime:
  nr_workers: 1
  endpoints:
    # Total capacity per service = nr_gpus x replicas_per_container x n_concurrent_rollouts
    # SENS: 4 x 1 x 3 = 12
    # DRIV: 4 x 1 x 3 = 12
    # PHYS: 6 x 1 x 2 = 12
    # CONT: 1 (CPU) x 2 x 6 = 12
    sensorsim:
      n_concurrent_rollouts: 3
    driver:
      n_concurrent_rollouts: 3
    physics:
      n_concurrent_rollouts: 2
      skip: false
    controller:
      n_concurrent_rollouts: 6
      skip: false
    trafficsim:
      skip: true
